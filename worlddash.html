<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#080c10"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>WorldDash</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="PantherUI.css"/>
<link rel="stylesheet" href="worlddash.css"/>
</head>
<body>
<div id="app">

  <!-- -- HEADER --------------------------------------- -->
  <header id="header">
    <div class="logo-wrap">
      <!-- Inline panther-eyes SVG mark, scaled down -->
      <svg class="logo-mark" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="lbg" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#141420"/>
            <stop offset="100%" stop-color="#060608"/>
          </radialGradient>
        </defs>
        <rect width="120" height="60" fill="url(#lbg)" rx="4"/>
        <!-- Left brow -->
        <polygon points="8,14 28,8 18,28" fill="#1e1e2a"/>
        <polygon points="8,14 5,34 18,28" fill="#181820"/>
        <!-- Right brow -->
        <polygon points="112,14 92,8 102,28" fill="#1c1c28"/>
        <polygon points="112,14 115,34 102,28" fill="#161620"/>
        <!-- Left iris -->
        <polygon points="8,30 28,20 22,38" fill="#c87010"/>
        <polygon points="8,30 22,38 18,46" fill="#a05808"/>
        <polygon points="28,20 42,30 30,34" fill="#e8960e"/>
        <polygon points="42,30 30,34 35,44" fill="#c06a08"/>
        <!-- Left pupil -->
        <polygon points="24,24 30,30 26,36" fill="#080406"/>
        <polygon points="24,24 22,33 26,36" fill="#0a0608"/>
        <!-- Left catchlight -->
        <polygon points="14,24 20,22 17,28" fill="#fff8e0" opacity="0.9"/>
        <!-- Right iris -->
        <polygon points="112,30 92,20 98,38" fill="#c87010"/>
        <polygon points="112,30 98,38 102,46" fill="#a05808"/>
        <polygon points="92,20 78,30 90,34" fill="#e8960e"/>
        <polygon points="78,30 90,34 85,44" fill="#c06a08"/>
        <!-- Right pupil -->
        <polygon points="96,24 90,30 94,36" fill="#080406"/>
        <polygon points="96,24 98,33 94,36" fill="#0a0608"/>
        <!-- Right catchlight -->
        <polygon points="106,24 100,22 103,28" fill="#fff8e0" opacity="0.9"/>
        <!-- Bridge -->
        <polygon points="42,28 78,28 60,36" fill="#0e0e18"/>
      </svg>
      <div>
        <div class="logo-text">World<span>Dash</span></div>
      </div>
    </div>

    <div id="toolbar">
      <button class="tb-btn fetch-btn" id="btn-fetch" title="Fetch weather data">⟳ FETCH</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-s1" title="Show clocks">1</button>
      <button class="tb-btn" id="btn-s2" title="Show current weather">2</button>
      <button class="tb-btn" id="btn-s3" title="Show hourly forecast">3</button>
      <button class="tb-btn" id="btn-s4" title="Show daily forecast">4</button>
      <button class="tb-btn" id="btn-s5" title="Show alerts">5</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-settings" title="Settings">⚙ SETTINGS</button>
    </div>
  </header>

  <!-- -- STAGE ---------------------------------------- -->
  <main id="stage">
    <div id="grid">
      <div class="cell" id="cell-0">
        <div class="panther-Carousel-container" id="container-0">
          <div class="panther-Carousel-carousel" id="carousel-0"></div>
        </div>
        <div id="indicator-0"></div>
      </div>
      <div class="cell" id="cell-1">
        <div class="panther-Carousel-container" id="container-1">
          <div class="panther-Carousel-carousel" id="carousel-1"></div>
        </div>
        <div id="indicator-1"></div>
      </div>
      <div class="cell" id="cell-2">
        <div class="panther-Carousel-container" id="container-2">
          <div class="panther-Carousel-carousel" id="carousel-2"></div>
        </div>
        <div id="indicator-2"></div>
      </div>
      <div class="cell" id="cell-3">
        <div class="panther-Carousel-container" id="container-3">
          <div class="panther-Carousel-carousel" id="carousel-3"></div>
        </div>
        <div id="indicator-3"></div>
      </div>
    </div>
  </main>

  <!-- -- FOOTER --------------------------------------- -->
  <footer id="footer">
    <div id="status-spinner" class="spinner" style="display:none;"></div>
    <div id="status-msg">Ready</div>
    <div class="footer-timestamps">
      <div class="ts-item">
        <span class="ts-label">Updated</span>
        <span class="ts-val" id="ts-updated">—</span>
      </div>
      <div class="ts-item">
        <span class="ts-label">Next</span>
        <span class="ts-val" id="ts-next">—</span>
      </div>
    </div>
  </footer>

</div>

<!-- -- SETTINGS DIALOG ------------------------------ -->
<div class="dialog-overlay" id="settings-overlay">
  <div class="dialog" role="dialog" aria-label="Settings">
    <div class="dialog-header">
      <div class="dialog-title">Settings</div>
      <button class="dialog-close" id="settings-close" aria-label="Close">✕</button>
    </div>
    <div class="dialog-body">

      <!-- Theme & Units -->
      <div class="dialog-section">
        <div class="dialog-section-title">Display</div>
        <div class="form-row">
          <label class="form-label">Theme</label>
          <select class="form-select" id="s-theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Units</label>
          <select class="form-select" id="s-units">
            <option value="metric">Metric (°C, m/s)</option>
            <option value="imperial">Imperial (°F, mph)</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Font Size</label>
          <select class="form-select" id="s-fontsize">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Snap Easing</label>
          <select class="form-select" id="s-easing">
            <!-- Options injected by populateEasingDropdown() -->
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">Swipe Sensitivity</label>
          <div class="slider-wrap">
            <span class="slider-lo">Low</span>
            <input type="range" class="form-range" id="s-sensitivity"
                   min="0.5" max="5.0" step="0.1" value="2.0"
                   oninput="updateSensitivityLabel(this.value)"/>
            <span class="slider-hi">High</span>
            <span class="slider-val" id="s-sensitivity-label">2.0×</span>
          </div>
        </div>
      </div>

      <!-- API Key -->
      <div class="dialog-section">
        <div class="dialog-section-title">OpenWeatherMap API</div>
        <div class="form-row">
          <label class="form-label">API Key</label>
          <input class="form-input" id="s-apikey" type="password" placeholder="Enter your API key…" autocomplete="off" spellcheck="false"/>
        </div>
        <div style="font-size:0.58rem;color:var(--text3);letter-spacing:0.06em;line-height:1.7;padding-left:100px;">
          Free key at openweathermap.org — uses API 2.5 (free tier).
          Each fetch = 2 requests per location (weather + forecast).
        </div>
      </div>

      <!-- Locations -->
      <div class="dialog-section">
        <div class="dialog-section-title">Locations (max 4)</div>
        <div class="search-row">
          <input class="form-input" id="s-search" type="text" placeholder="Search city…" autocomplete="off" spellcheck="false"/>
          <button class="btn-sm primary" id="s-search-btn">Search</button>
        </div>
        <div class="search-results" id="search-results"></div>
        <div id="location-list"></div>
      </div>

      <!-- Import / Export -->
      <div class="dialog-section">
        <div class="dialog-section-title">Data</div>
        <div class="ie-row">
          <button class="btn-sm" id="s-export">↓ Export JSON</button>
          <button class="btn-sm" id="s-import">↑ Import JSON</button>
          <input type="file" id="s-import-file" accept=".json" style="display:none"/>
        </div>
      </div>

    </div>
    <div class="dialog-footer">
      <button class="btn-sm" id="s-cancel">Cancel</button>
      <button class="btn-sm primary" id="s-save">Save</button>
    </div>
  </div>
</div>

<script src="PantherUI.js"></script>
<script src="worlddash.js"></script>
</body>
</html>
